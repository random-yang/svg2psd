<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG → PSD 转换器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #86868b;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .drop-zone {
      width: 100%;
      max-width: 500px;
      padding: 3rem 2rem;
      border: 2px dashed #d2d2d7;
      border-radius: 16px;
      background: #fff;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #0071e3;
      background: #f0f7ff;
    }

    .drop-zone-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }

    .drop-zone-text {
      color: #86868b;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .drop-zone-text .link {
      color: #0071e3;
      text-decoration: underline;
      cursor: pointer;
    }

    input[type="file"] { display: none; }

    .options {
      width: 100%;
      max-width: 500px;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
    }

    .options label {
      font-size: 0.9rem;
      color: #6e6e73;
    }

    .options input[type="number"] {
      width: 4rem;
      padding: 0.3rem 0.5rem;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
    }

    .status {
      width: 100%;
      max-width: 500px;
      margin-top: 1.5rem;
      text-align: center;
      display: none;
    }

    .status.visible { display: block; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e8e8ed;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .progress-fill {
      height: 100%;
      background: #0071e3;
      border-radius: 3px;
      width: 0%;
      transition: width 0.15s;
    }

    .status-text {
      font-size: 0.9rem;
      color: #6e6e73;
    }

    .status-text.error { color: #ff3b30; }

    .download-btn {
      display: none;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .download-btn:hover { background: #0077ed; }
    .download-btn.visible { display: inline-block; }

    .layer-list {
      width: 100%;
      max-width: 500px;
      margin-top: 1.5rem;
      display: none;
    }

    .layer-list.visible { display: block; }

    .layer-list h3 {
      font-size: 0.85rem;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .layer-item {
      padding: 0.4rem 0.75rem;
      background: #fff;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .layer-type {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .layer-type.group { background: #e8e8ed; color: #6e6e73; }
    .layer-type.text { background: #e3f2fd; color: #0071e3; }
    .layer-type.graphic { background: #fce4ec; color: #c62828; }

    .engine-switch {
      width: 100%;
      max-width: 500px;
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .engine-switch label {
      font-size: 0.9rem;
      color: #6e6e73;
    }

    .engine-name {
      font-weight: 600;
      font-size: 0.9rem;
      padding: 2px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .engine-name.ts {
      background: #e3f2fd;
      color: #0071e3;
    }

    .engine-name.rust {
      background: #fff3e0;
      color: #e65100;
    }

    .toggle-track {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-track input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #0071e3;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-track input:checked + .toggle-slider {
      background: #e65100;
    }

    .toggle-track input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .timing {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #6e6e73;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>SVG → PSD</h1>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">📁</div>
    <div class="drop-zone-text">
      拖放 SVG 文件到此处<br>
      或 <span class="link" id="browseLink">选择文件</span>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".svg">

  <div class="engine-switch">
    <label>引擎:</label>
    <span id="engineLabel" class="engine-name ts">TypeScript</span>
    <label class="toggle-track">
      <input type="checkbox" id="engineToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="options">
    <label for="scaleInput">缩放倍数:</label>
    <input type="number" id="scaleInput" value="1" min="0.1" max="10" step="0.5">
  </div>

  <div class="status" id="status">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status-text" id="statusText">准备中...</div>
  </div>

  <div class="timing" id="timing"></div>
  <button class="download-btn" id="downloadBtn">下载 PSD</button>

  <div class="layer-list" id="layerList">
    <h3>图层预览</h3>
    <div id="layerItems"></div>
  </div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
